<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategist — opener ultra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #0f0f13;
  --bg2:       #16161c;
  --surface:   #1c1c24;
  --surface2:  #23232d;
  --surface3:  #2a2a36;
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.1);
  --text:      #e8e6f0;
  --text2:     #7c7a8e;
  --text3:     #45434f;
  --accent:    #7b61ff;
  --accent2:   #a48fff;
  --accent-bg: rgba(123,97,255,0.1);
  --gold:      #f0b429;
  --gold-bg:   rgba(240,180,41,0.1);
  --green:     #34d399;
  --green-bg:  rgba(52,211,153,0.1);
  --red:       #f87171;
  --red-bg:    rgba(248,113,113,0.1);
  --teal:      #22d3ee;
  --teal-bg:   rgba(34,211,238,0.1);
  --pink:      #f472b6;
  --pink-bg:   rgba(244,114,182,0.1);
  --radius:    16px;
  --radius-sm: 10px;
  --shadow:    0 4px 12px rgba(0,0,0,0.05);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
  --font-display: 'Syne', sans-serif;
  --font-body:    'Noto Sans KR', -apple-system, sans-serif;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
  background: rgba(15,15,19,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 200;
}
.logo {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 700;
  letter-spacing: -0.3px; color: var(--text);
}
.logo span { color: var(--accent); }
.stage-badge {
  font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--accent2);
  background: var(--accent-bg);
  border: 1px solid rgba(123,97,255,0.2);
  padding: 4px 12px; border-radius: 100px;
}

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  min-height: calc(100vh - 56px);
}

/* ── Left config panel ── */
.config-panel {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 28px 24px;
  overflow-y: auto;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
}

.panel-title {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 16px;
}

.form-group { margin-bottom: 20px; }
.form-label {
  display: block;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--text2); margin-bottom: 8px;
}

input[type="text"] {
  width: 100%; height: 40px; padding: 0 12px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 13px; color: var(--text);
  outline: none; transition: border-color 0.2s;
}
input[type="text"]:focus { border-color: var(--accent); }
input::placeholder { color: var(--text3); }

/* Country grid */
.country-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.country-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  color: var(--text2); cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.country-btn:hover { border-color: var(--border2); color: var(--text); }
.country-btn.active {
  background: var(--accent-bg);
  border-color: rgba(123,97,255,0.4);
  color: var(--accent2);
}
.country-flag { font-size: 15px; }
.country-style {
  font-size: 9px; color: var(--text3);
  margin-top: 1px; line-height: 1;
}

/* Role selector */
.role-grid {
  display: flex; flex-direction: column; gap: 4px;
}
.role-btn {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  color: var(--text2); cursor: pointer; transition: all 0.15s;
}
.role-btn:hover { border-color: var(--border2); color: var(--text); }
.role-btn.active {
  background: var(--gold-bg);
  border-color: rgba(240,180,41,0.3);
  color: var(--gold);
}
.role-level {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 100px;
  background: var(--surface2); color: var(--text3);
}
.level-c_suite { background: rgba(244,114,182,0.1); color: var(--pink); }
.level-vp      { background: rgba(34,211,238,0.1);  color: var(--teal); }
.level-manager { background: rgba(52,211,153,0.1);  color: var(--green); }
.level-ic      { background: var(--surface2);        color: var(--text3); }

/* Generate button */
.btn-generate {
  width: 100%; height: 44px; margin-top: 8px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font-display); font-size: 14px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.3px;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-generate:hover { background: #6b50f0; box-shadow: 0 4px 20px rgba(123,97,255,0.4); }
.btn-generate:active { transform: scale(0.98); }

/* ── Right output panel ── */
.output-panel {
  padding: 32px 36px;
  overflow-y: auto;
}

/* Empty state */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh; text-align: center;
  gap: 16px;
}
.empty-icon {
  width: 72px; height: 72px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
}
.empty-title {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 700;
  color: var(--text2);
}
.empty-sub { font-size: 13px; color: var(--text3); max-width: 280px; line-height: 1.6; }

/* Blueprint header */
.bp-header {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
.bp-title {
  font-family: var(--font-display);
  font-size: 30px; font-weight: 800;
  letter-spacing: -0.8px; color: var(--text);
  line-height: 1.15;
}
.bp-title span { color: var(--accent2); }
.bp-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.bp-pill {
  font-size: 11px; font-weight: 700;
  padding: 4px 12px; border-radius: 100px;
  letter-spacing: 0.3px;
}
.pill-style { background: var(--accent-bg); color: var(--accent2); border: 1px solid rgba(123,97,255,0.2); }
.pill-country { background: var(--surface2); color: var(--text2); }
.pill-role { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(240,180,41,0.2); }

/* Insight cards */
.insight-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 24px;
}
.insight-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
}
.insight-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 8px;
}
.insight-label.culture { color: var(--teal); }
.insight-label.role { color: var(--gold); }
.insight-text { font-size: 13px; line-height: 1.6; color: var(--text2); }

/* Opening hook */
.hook-card {
  background: linear-gradient(135deg, rgba(123,97,255,0.12) 0%, rgba(123,97,255,0.04) 100%);
  border: 1px solid rgba(123,97,255,0.2);
  border-radius: var(--radius);
  padding: 20px 24px; margin-bottom: 24px;
}
.hook-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--accent2); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.hook-text {
  font-size: 15px; font-weight: 500;
  color: var(--text); line-height: 1.6;
  font-style: italic;
}
.copy-mini {
  margin-top: 10px; float: right;
  font-size: 11px; font-weight: 600;
  color: var(--accent2); background: var(--accent-bg);
  border: 1px solid rgba(123,97,255,0.2);
  padding: 4px 12px; border-radius: 100px;
  cursor: pointer; border: none; font-family: var(--font-body);
  transition: all 0.15s;
}
.copy-mini:hover { background: rgba(123,97,255,0.2); }

/* Sections */
.sections-header {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 14px;
}
.sections-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.section-card-header {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px; cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.section-card-header:hover { background: var(--surface2); }
.section-num {
  width: 28px; height: 28px; flex-shrink: 0;
  background: var(--accent-bg);
  border: 1px solid rgba(123,97,255,0.2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 12px; font-weight: 700;
  color: var(--accent2);
}
.section-title-text {
  flex: 1; font-size: 14px; font-weight: 600; color: var(--text);
}
.section-badges { display: flex; gap: 6px; align-items: center; }
.sec-badge {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 100px;
}
.tone-direct   { background: rgba(248,113,113,0.1); color: var(--red); }
.tone-trust    { background: rgba(52,211,153,0.1);  color: var(--green); }
.tone-data     { background: rgba(34,211,238,0.1);  color: var(--teal); }
.tone-warm     { background: rgba(240,180,41,0.1);  color: var(--gold); }
.tone-default  { background: var(--surface2);        color: var(--text3); }
.len-short  { color: var(--green); }
.len-medium { color: var(--gold); }
.len-long   { color: var(--red); }
.len-icon   { font-size: 11px; }

.section-body {
  padding: 0 20px 16px;
  border-top: 1px solid var(--border);
  display: none;
}
.section-body.open { display: block; }
.sec-field { margin-top: 12px; }
.sec-field-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 4px;
}
.sec-field-value { font-size: 13px; line-height: 1.6; color: var(--text2); }
.evidence-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.evidence-chip {
  font-size: 11px; padding: 3px 9px;
  background: var(--surface2); color: var(--text2);
  border-radius: 100px; border: 1px solid var(--border2);
}
.sec-tip {
  margin-top: 10px; padding: 10px 14px;
  background: var(--surface2); border-radius: var(--radius-sm);
  font-size: 12px; line-height: 1.6; color: var(--text2);
  border-left: 2px solid var(--accent);
}

/* Do/Don't grid */
.dos-donts {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-bottom: 24px;
}
.do-card, .dont-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
}
.do-card { border-top: 2px solid var(--green); }
.dont-card { border-top: 2px solid var(--red); }
.dos-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
  margin-bottom: 12px;
}
.dos-title.do { color: var(--green); }
.dos-title.dont { color: var(--red); }
.dos-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
.dos-list li {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 12px; line-height: 1.5; color: var(--text2);
}
.dos-list li::before { font-size: 11px; flex-shrink: 0; margin-top: 1px; }
.dos-list.do li::before { content: "✓"; color: var(--green); }
.dos-list.dont li::before { content: "✗"; color: var(--red); }

/* Cultural tips */
.tips-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px; margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.tips-header {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--teal); margin-bottom: 14px;
}
.tips-list { display: flex; flex-direction: column; gap: 10px; }
.tip-item {
  display: flex; gap: 12px;
  font-size: 12px; line-height: 1.55; color: var(--text2);
}
.tip-icon { font-size: 14px; flex-shrink: 0; }

/* CTA card */
.cta-card {
  background: linear-gradient(135deg, rgba(240,180,41,0.08) 0%, rgba(240,180,41,0.03) 100%);
  border: 1px solid rgba(240,180,41,0.2);
  border-radius: var(--radius);
  padding: 22px 26px;
}
.cta-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 10px;
}
.cta-text {
  font-size: 16px; font-weight: 600;
  color: var(--text); line-height: 1.55;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .config-panel { position: static; height: auto; }
  .insight-row { grid-template-columns: 1fr; }
  .dos-donts { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">opener<span>ultra</span></div>
  <div class="stage-badge">STRATEGIST · STAGE 4</div>
</header>

<div class="layout">

  <!-- Config Panel -->
  <div class="config-panel">
    <div class="panel-title">⚙ 프로토콜 설정</div>

    <div class="form-group">
      <label class="form-label">제품명</label>
      <input type="text" id="product-name" placeholder="예: OpenerUltra" value="OpenerUltra" />
    </div>

    <div class="form-group">
      <label class="form-label">🌍 타겟 국가</label>
      <div class="country-grid" id="country-grid"></div>
    </div>

    <div class="form-group">
      <label class="form-label">👤 담당자 직무</label>
      <div class="role-grid" id="role-grid"></div>
    </div>

    <button class="btn-generate" onclick="generateBlueprint()">
      ✦ 블루프린트 생성
    </button>
  </div>

  <!-- Output Panel -->
  <div class="output-panel" id="output-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🗺</div>
      <div class="empty-title">국가 × 직무를 선택하세요</div>
      <div class="empty-sub">선택 조합에 맞는 제안서 프로토콜이 즉시 생성됩니다. 10개 국가 × 15개 직무 = 150가지 전략.</div>
    </div>
    <div id="blueprint-output" style="display:none"></div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════
   Data — mirroring strategist.py
════════════════════════════════════════════ */
const COUNTRIES = [
  { key:'usa',           name:'미국',     flag:'🇺🇸', style:'결론 중심' },
  { key:'japan',         name:'일본',     flag:'🇯🇵', style:'신뢰 중심' },
  { key:'korea',         name:'한국',     flag:'🇰🇷', style:'리스크 제거' },
  { key:'china',         name:'중국',     flag:'🇨🇳', style:'권위 중심' },
  { key:'germany',       name:'독일',     flag:'🇩🇪', style:'데이터 중심' },
  { key:'uk',            name:'영국',     flag:'🇬🇧', style:'실용 중심' },
  { key:'southeast_asia',name:'동남아',   flag:'🌏', style:'가성비 중심' },
  { key:'india',         name:'인도',     flag:'🇮🇳', style:'가치 중심' },
  { key:'middle_east',   name:'중동',     flag:'🌙', style:'관계 중심' },
  { key:'latam',         name:'중남미',   flag:'🌎', style:'스토리 중심' },
];

const ROLES = [
  { key:'ceo',              name:'CEO / 대표이사',     level:'c_suite', fear:'경쟁에서 뒤처지는 것' },
  { key:'cfo',              name:'CFO / 재무책임자',   level:'c_suite', fear:'ROI 없는 지출' },
  { key:'cto',              name:'CTO / 기술책임자',   level:'c_suite', fear:'기술 부채·보안 사고' },
  { key:'vp_sales',         name:'VP Sales',           level:'vp',      fear:'쿼터 미달' },
  { key:'vp_marketing',     name:'VP Marketing',       level:'vp',      fear:'리드 품질 지적' },
  { key:'vp_engineering',   name:'VP Engineering',     level:'vp',      fear:'팀 과부하·장애' },
  { key:'sales_manager',    name:'세일즈 매니저',      level:'manager', fear:'팀 쿼터 미달 압박' },
  { key:'it_manager',       name:'IT 매니저',          level:'manager', fear:'보안 사고·시스템 다운' },
  { key:'procurement',      name:'구매/조달 담당자',   level:'manager', fear:'비싼 계약·감사 지적' },
  { key:'developer',        name:'개발자',             level:'ic',      fear:'불편한 도구 강제 도입' },
  { key:'data_analyst',     name:'데이터 분석가',      level:'ic',      fear:'잘못된 데이터로 오류' },
];

/* ════════════════════════════════════════════
   Blueprint data (full protocol engine)
════════════════════════════════════════════ */
const CULTURE_DB = {
  usa: {
    flag:'🇺🇸', name:'미국', style:'CONCLUSION_FIRST',
    insight:'결론을 먼저, 근거는 나중. 숫자가 설득한다.',
    drivers:['ROI','속도','혁신','경쟁 우위'],
    tones:['bold·direct','analytical','confident'],
    taboos:['may','might consider','respectfully','if you don\'t mind'],
    greeting:'이름(First Name) 직접 호칭. 바로 본론.',
    emailStyle:"숫자+동사+결과: 'Cut CAC by 40% in 60 Days'",
    meetingOpener:"'Let me cut to the chase—here's what we can do for you.'",
    evidence:['ROI 수치','A/B 테스트 결과','유사 고객 사례','데모'],
    riskAppetite:'high', trustBasis:'task',
  },
  japan: {
    flag:'🇯🇵', name:'일본', style:'TRUST_FIRST',
    insight:'결론보다 관계가 먼저. 린지 과정을 존중하고, 결정자보다 영향자를 설득하라.',
    drivers:['신뢰','안정성','장기 파트너십','리스크 회피'],
    tones:['formal·humble','attentive','respectful'],
    taboos:['빨리','즉시 결정','limited time','urgent','aggressive'],

let selectedCountry = null;
let selectedRole = null;

/* ════════════════════════════════════════════
   Init UI
════════════════════════════════════════════ */
function initUI() {
  // Country grid
  const cg = document.getElementById('country-grid');
  COUNTRIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'country-btn';
    btn.dataset.key = c.key;
    btn.innerHTML = `<span class="country-flag">${c.flag}</span><div><div>${c.name}</div><div class="country-style">${c.style}</div></div>`;
    btn.onclick = () => selectCountry(c.key);
    cg.appendChild(btn);
  });

  // Role grid
  const rg = document.getElementById('role-grid');
  ROLES.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'role-btn';
    btn.dataset.key = r.key;
    btn.innerHTML = `<span>${r.name}</span><span class="role-level level-${r.level}">${r.level.replace('_',' ')}</span>`;
    btn.onclick = () => selectRole(r.key);
    rg.appendChild(btn);
  });
}

function selectCountry(key) {
  selectedCountry = key;
  document.querySelectorAll('.country-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  if (selectedCountry && selectedRole) generateBlueprint();
}
function selectRole(key) {
  selectedRole = key;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  if (selectedCountry && selectedRole) generateBlueprint();
}

/* ════════════════════════════════════════════
   Generate Blueprint
════════════════════════════════════════════ */
function generateBlueprint() {
  if (!selectedCountry || !selectedRole) return;

  const product = document.getElementById('product-name').value.trim() || 'OpenerUltra';
  const culture = CULTURE_DB[selectedCountry];
  const role    = ROLE_DB[selectedRole];
  if (!culture || !role) return;

  const sections = SECTIONS_BY_STYLE[culture.style] || SECTIONS_BY_STYLE.CONCLUSION_FIRST;
  const cta = CTA_BY_STYLE[culture.style] || '다음 단계를 논의하기 위해 미팅을 제안드립니다.';

  const opening = buildOpeningHook(culture, role, product);
  const doList  = [...new Set([...culture.tones.slice(0,2), ...role.mustInclude.slice(0,3)])];
  const dontList = [...new Set([...culture.taboos.slice(0,3), ...role.mustExclude.slice(0,2)])];
  const culturalTips = [
    { icon:'🤝', tip:`인사법: ${culture.greeting}` },
    { icon:'✉', tip:`이메일 제목: ${culture.emailStyle}` },
    { icon:'🎤', tip:`미팅 오프너: ${culture.meetingOpener}` },
    { icon:'📊', tip:`선호 증거: ${culture.evidence.slice(0,3).join(', ')}` },
  ];

  renderBlueprint({ culture, role, product, sections, opening, cta, doList, dontList, culturalTips });
}

function buildOpeningHook(culture, role, product) {
  const hooks = {
    CONCLUSION_FIRST: `${product}를 도입한 유사 기업은 ${role.kpis[0]}를 평균 40% 개선했습니다—바로 보여드리겠습니다.`,
    TRUST_FIRST: `귀사의 ${role.kpis[0]} 과제에 대해 사전에 깊이 공부했습니다. 저희가 어떻게 장기적 파트너가 될 수 있는지 말씀드리겠습니다.`,
    VALUE_FIRST: `비슷한 규모의 기업이 ${product}로 비용을 크게 절약하고 있습니다—어떻게 가능한지 3분 안에 설명드리겠습니다.`,
    STORY_FIRST: `6개월 전, 여러분과 똑같은 고민을 하던 회사가 있었습니다. 그들의 이야기를 먼저 들어보시겠어요?`,
    DATA_FIRST: `업계 데이터에 따르면 ${role.kpis[0]} 미달의 주원인 3가지가 있습니다—${product}는 그 중 2가지를 완전히 제거합니다.`,
    RISK_FIRST: `경쟁사 중 이미 3곳이 ${product}를 도입했습니다. ${role.fear.split('.')[0]}에 대한 우려를 먼저 해소해 드리겠습니다.`,
    HIERARCHY_FIRST: `[권위 레퍼런스]와의 전략적 협력 경험을 바탕으로, 귀사에 최적화된 솔루션을 제안드립니다.`,
    RELATIONSHIP_FIRST: `귀사와 장기적인 전략 파트너십을 목표로 이 자리를 준비했습니다. 먼저 저희를 소개해 드리겠습니다.`,
  };
  return hooks[culture.style] || `${product}가 ${role.kpis[0]}를 어떻게 개선하는지 보여드리겠습니다.`;
}

  if (/trust|humble|warm|soft|relat/.test(tone)) return 'tone-trust';
  if (/data|analyt|precise|tech|struct/.test(tone)) return 'tone-data';
  return 'tone-default';
}
function lenClass(l) { return `len-${l}`; }

      ${sections.map((s,i) => `
        <div class="section-card" style="animation-delay:${i*0.06}s">
          <div class="section-card-header" onclick="toggleSection(this)">
            <div class="section-num">${i+1}</div>
            <div class="section-title-text">${s.title}</div>
            <div class="section-badges">
              <span class="sec-badge ${toneClass(s.tone)}">${s.tone}</span>
              <span class="len-icon ${lenClass(s.length)}">${LEN_ICON[s.length]||'▪'}</span>
            </div>
          </div>
          <div class="section-body" id="sec-body-${i}">
            <div class="sec-field"><div class="sec-field-label">목적</div><div class="sec-field-value">${s.purpose}</div></div>
            <div class="sec-field"><div class="sec-field-label">핵심 메시지</div><div class="sec-field-value">${s.message}</div></div>
            <div class="sec-field">
              <div class="sec-field-label">사용 증거</div>
              <div class="evidence-chips">${s.evidence.map(e=>`<span class="evidence-chip">${e}</span>`).join('')}</div>
            </div>
            <div class="sec-tip">💡 ${s.tip}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="dos-donts">
      <div class="do-card">
        <div class="dos-title do">✅ DO — 반드시 포함</div>
        <ul class="dos-list do">
          ${doList.map(d=>`<li>${d}</li>`).join('')}
        </ul>
      </div>
      <div class="dont-card">
        <div class="dos-title dont">❌ DON'T — 절대 금기</div>
        <ul class="dos-list dont">
          ${dontList.map(d=>`<li>${d}</li>`).join('')}
        </ul>
      </div>
    </div>

    <div class="tips-card">
      <div class="tips-header">🌐 문화 프로토콜</div>
      <div class="tips-list">
        ${culturalTips.map(t=>`<div class="tip-item"><span class="tip-icon">${t.icon}</span>${t.tip}</div>`).join('')}
      </div>
    </div>

    <div class="cta-card">
      <div class="cta-label">📞 마무리 CTA</div>
      <div class="cta-text" id="cta-text">${cta}</div>
      <button class="copy-mini" onclick="copyText(document.getElementById('cta-text').textContent)" style="margin-top:12px">📋 복사</button>
    </div>
  `;

  // Auto-open first section
  const firstBody = document.getElementById('sec-body-0');
  if (firstBody) firstBody.classList.add('open');
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

function copyText(text) {
  navigator.clipboard.writeText(text.replace(/"/g,'').trim());
}

initUI();
</script>
</body>
</html>
